<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login with SuperRadio</title>
    <link rel="stylesheet" href="./style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class='app-login'>
        <div class="brand-header">
            <span class="brand-name">SuperRadio</span>
        </div>

        <div class="login-card">
            <h1 class="card-title">Welcome back</h1>
            <p class="card-subtitle">Pick up where the night left off.</p>

            <div id="google-btn-container" style="width: 100%; display: flex; justify-content: center; margin-bottom: 8px;"></div>

            <div class="divider-container">
                <div class="divider-line"></div>
                <div class="divider-text">or</div>
                <div class="divider-line"></div>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <div class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    </div>
                    <input type="email" id="email" class="form-input" placeholder="you@gmail.com" required>
                </div>

                <div class="form-group">
                    <div class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </div>
                    <input type="password" id="password" class="form-input" placeholder="Password" required>
                </div>

                <button type="submit" class="submit-btn">Sign in</button>
            </form>

            <p class="footer-text">New to SuperRadio? <a href="#" class="footer-link">Create an account</a></p>
        </div>

        <p class="etiquette-text">By continuing you agree to SuperRadio's late-night listening etiquette.</p>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="./script/auth.js"></script>
</body>
</html>
