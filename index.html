<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <link rel="stylesheet" href="/super-music/style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">Spotify</div>
            <nav class="nav-links">
                <p class="section-title">EXPLORE</p>
                <a href="#" class="active"><i class="fas fa-home"></i> Home</a>
                <a href="#" id="nav-radio"><i class="fas fa-radio"></i> Radio Stations</a>
                <a href="#"><i class="fas fa-broadcast-tower"></i> Live Sessions</a>
                
                <p class="section-title">LIBRARY</p>
                <a href="#"><i class="fas fa-heart"></i> Favorites</a>
            <!-- <a href="#"><i class="fas fa-history"></i> Recent</a> -->
            </nav>
        </aside>

        <main class="main-content">
            <header class="parallax-hero">
                <div class="parallax-bg"></div>
                <div class="hero-content">
                    <h1>Vibe with me</h1>
                    <p>I just built a web streaming music platform with various radio links.</p>
                    <button class="explore-btn" onclick="scrollToStations()">Explore Stations</button>
                </div>
            </header>

            <section id="radio-section" class="radio-dashboard">
                <h2 class="section-heading">Live Radio Stations</h2>
                <div class="station-grid"></div>
            </section>
        </main>

        <div class="music-container">
            <div class="track-info-group">
                <div class="img-container">
                    <img src="assets/album_1.jpg" id="cover">
                </div>
                <div class="text-meta">
                    <h4 id="title">Song title</h4>
                    <span>Live Radio Stream</span>
                </div>
            </div>

            <div class="player-controls-group">
                <div class="navigation">
                    <button id="prev" class="action-btn">
                        <i class="fas fa-backward"></i>
                    </button>
                    <button id="play" class="action-btn action-btn-big">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="next" class="action-btn">
                        <i class="fas fa-forward"></i>
                    </button>
                </div>

                <div class="progress-wrapper">
                    <span class="time">00:00</span>
                    <div class="progress-container">
                        <div class="progress"></div>
                    </div>
                    <span class="time live-indicator">
                            <span class="live-dot"></span>
                            Live
                        </span>                
                    </div>
            </div>

            <div class="volume-controls-group">
                <button id="mute" class="action-btn">
                    <i class="fas fa-volume-up"></i>
                </button>
                
                <div class="volume-container">
                    <div class="volume-slider" id="volumeSlider"></div>
                </div>
            </div>

            <audio src="audio/Famy - Ava (Lyrics).mp3" id="audio"></audio>
            
        </div>  
    </div>

    <script src="/super-music/script/script.js"></script>
</body>
</html>
